<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse - Derrière le Masque</title>
    <style>
        body { background-color: #2c2c2c; color: #ffffff; font-family: 'Georgia', serif; padding: 40px; line-height: 1.6; }
        .container { max-width: 700px; margin: auto; background-color: #3d3d3d; padding: 30px; border-radius: 15px; border: 2px solid #d4af37; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; text-align: center; text-transform: uppercase; font-size: 1.8em; margin-bottom: 30px; }
        .question { margin-bottom: 25px; border-bottom: 1px solid #555; padding-bottom: 15px; text-align: left; }
        .question p { font-size: 1.1em; margin-bottom: 10px; font-weight: bold; }
        input[type="radio"] { margin-right: 10px; accent-color: #d4af37; cursor: pointer; }
        .empreinte-box { border: 1px solid #d4af37; padding: 20px; background: rgba(212, 175, 55, 0.05); border-radius: 10px; margin-top: 30px; }
        textarea, input[type="email"] { width: 100%; background: #2c2c2c; color: white; border: 1px solid #555; border-radius: 5px; padding: 12px; box-sizing: border-box; margin-top: 10px; font-family: sans-serif; }
        button { background-color: #d4af37; color: #2c2c2c; border: none; padding: 20px 30px; font-size: 1.2em; font-weight: bold; border-radius: 5px; cursor: pointer; display: block; width: 100%; margin-top: 30px; transition: 0.3s; }
        button:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Votre Analyse Signature</h1>
        <form id="quizForm">
            <!-- (Ici tes 7 questions QCM déjà faites) -->
            <div class="question"><p>1. Face à un conflit, vous privilégiez :</p>
                <input type="radio" name="q1" value="Apaisement" required> L'apaisement <input type="radio" name="q1" value="Confrontation"> La confrontation <input type="radio" name="q1" value="Recul"> Le recul</div>
            <!-- ... ajoute les questions 2 à 7 ici ... -->

            <div class="empreinte-box">
                <div style="color:#d4af37; font-weight:bold;">🖋️ L’Empreinte de l’Esprit</div>
                <textarea id="texteLibre" placeholder="Une passion, une réflexion (50-500 car.)..." required></textarea>
            </div>

            <div style="margin-top:20px;">
                <p style="color:#d4af37; font-weight:bold;">📧 Votre e-mail pour l'envoi :</p>
                <input type="email" id="emailClient" placeholder="exemple@mail.com" required>
            </div>

            <button type="button" id="submitBtn" onclick="lancerAnalyse()">✨ GÉNÉRER MES 15 PARAGRAPHES</button>
        </form>
    </div>

    <!-- ON CHARGE LES DEUX CERVEAUX -->
    <script src="ia-analyse.js"></script>
    <script src="envoi-mail.js"></script>

    <script>
    async function lancerAnalyse() {
        const form = document.getElementById('quizForm');
        const email = document.getElementById('emailClient').value;
        const texte = document.getElementById('texteLibre').value;

        if (!form.checkValidity() || texte.length < 50) {
            alert("Merci de remplir tous les champs (7 questions + texte de 50 car. + email).");
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerHTML = "🌘 Analyse et Envoi en cours...";
        btn.disabled = true;

        const reponses = { q1: form.q1.value /* ... récupère q1 à q7 */ };

        // 1. L'IA RÉDIGE
        const analyse = await genererAnalyse(reponses, texte);
        
        // 2. LE FACTEUR ENVOIE
        const succes = await envoyerAnalyseParMail(email, analyse);

        if (succes) {
            alert("Félicitations ! Votre analyse est dans votre boîte mail.");
            window.location.href = "parrainage.html";
        } else {
            alert("Erreur lors de l'envoi. Vérifiez vos clés API sur Railway.");
            btn.disabled = false;
            btn.innerHTML = "RÉESSAYER";
        }
    }
    </script>
</body>
</html>
