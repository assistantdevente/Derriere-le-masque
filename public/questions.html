<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse - Derrière le Masque</title>
    <style>
        body { background-color: #2c2c2c; color: #ffffff; font-family: 'Georgia', serif; padding: 40px; line-height: 1.6; }
        .container { max-width: 700px; margin: auto; background-color: #3d3d3d; padding: 30px; border-radius: 15px; border: 2px solid #d4af37; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; text-align: center; text-transform: uppercase; font-size: 1.8em; margin-bottom: 30px; }
        .question { margin-bottom: 25px; border-bottom: 1px solid #555; padding-bottom: 15px; text-align: left; }
        .question p { font-size: 1.1em; margin-bottom: 10px; font-weight: bold; }
        input[type="radio"] { margin-right: 10px; accent-color: #d4af37; cursor: pointer; }
        .empreinte-box { border: 1px solid #d4af37; padding: 25px; background: rgba(212, 175, 55, 0.05); border-radius: 10px; margin-top: 30px; }
        textarea { width: 100%; background: #2c2c2c; color: white; border: 1px solid #555; border-radius: 5px; padding: 12px; box-sizing: border-box; margin-top: 10px; resize: none; min-height: 120px; }
        #compteur { font-size: 0.75em; color: #aaa; text-align: right; margin-top: 5px; }
        button { background-color: #d4af37; color: #2c2c2c; border: none; padding: 20px 30px; font-size: 1.2em; font-weight: bold; border-radius: 5px; cursor: pointer; display: block; width: 100%; margin-top: 30px; transition: 0.3s; }
        button:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Votre Analyse Signature</h1>
        <form id="quizForm">
            <div class="question"><p>1. Face à un conflit, vous privilégiez :</p>
                <input type="radio" name="q1" value="Apaisement" required> L'apaisement <input type="radio" name="q1" value="Confrontation"> La confrontation <input type="radio" name="q1" value="Recul"> Le recul</div>
            <div class="question"><p>2. Votre énergie se recharge :</p>
                <input type="radio" name="q2" value="Calme" required> Seul <input type="radio" name="q2" value="Groupe"> En groupe <input type="radio" name="q2" value="Tête-à-tête"> En tête-à-tête</div>
            <!-- (Répéter pour q3 à q7 avec tes questions précédentes) -->
            
            <div class="empreinte-box">
                <div style="color:#d4af37; font-weight:bold;">🖋️ L’Empreinte de l’Esprit</div>
                <p style="font-size:0.8em; color:#ccc;">Déposez ici une passion ou réflexion (50-500 car.).</p>
                <textarea id="texteLibre" placeholder="Écrivez ici..."></textarea>
                <div id="compteur">0 / 500 caractères</div>
            </div>
            <button type="button" id="submitBtn" onclick="validerTest()">✨ RECEVOIR MON ANALYSE</button>
        </form>
    </div>

    <script>
        const textarea = document.getElementById('texteLibre');
        textarea.addEventListener('input', () => {
            document.getElementById('compteur').innerText = textarea.value.length + " / 500 caractères";
        });

        async function validerTest() {
            const form = document.getElementById('quizForm');
            const texte = textarea.value.trim();
            if (!form.checkValidity() || texte.length < 50 || texte.length > 500) {
                alert("Merci de répondre aux 7 questions et de rédiger au moins 50 caractères.");
                return;
            }

            document.getElementById('submitBtn').innerHTML = "🌘 Analyse en cours...";
            document.getElementById('submitBtn').disabled = true;

            const reponses = { q1: form.q1.value, q2: form.q2.value /* ... ajouter q3-q7 */ };
            
            // Appel à l'IA (On suppose que ia-analyse.js est chargé ou accessible via API)
            console.log("Données prêtes :", localStorage.getItem('user_genre'), localStorage.getItem('user_age'), reponses, texte);
            
            setTimeout(() => {
                alert("Analyse générée avec succès !");
                window.location.href = "parrainage.html";
            }, 4000);
        }
    </script>
</body>
</

html>
