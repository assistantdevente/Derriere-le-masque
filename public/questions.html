<!-- (Tes questions 1 à 7 et l'Empreinte de l'Esprit sont juste au-dessus) -->

<!-- 1. CHAMP EMAIL (Juste avant le bouton) -->
<div style="margin-top: 20px; border-top: 1px solid #d4af37; padding-top: 20px;">
    <p style="color: #d4af37; font-weight: bold;">📧 Adresse e-mail pour l'envoi :</p>
    <input type="email" id="emailClient" placeholder="votre@mail.com" required 
           style="width: 100%; background: #2c2c2c; color: white; border: 1px solid #555; padding: 12px; border-radius: 5px; box-sizing: border-box;">
</div>

<button type="button" id="btnSubmit" onclick="lancerTout()">✨ RÉVÉLER MON ANALYSE</button>

<!-- 2. APPEL AUX SCRIPTS (Indispensable !) -->
<script src="ia-analyse.js"></script>
<script src="envoi-mail.js"></script>

<script>
async function lancerTout() {
    const form = document.getElementById('quizForm');
    const email = document.getElementById('emailClient').value;
    const texte = document.getElementById('texteLibre').value;

    // Sécurité : On vérifie que tout est rempli
    if (!form.checkValidity() || texte.length < 50) {
        alert("Merci de compléter tout le formulaire (Questions + Texte + Email).");
        return;
    }

    // Effet visuel de prestige
    const btn = document.getElementById('btnSubmit');
    btn.innerHTML = "🌘 Analyse et Envoi en cours...";
    btn.disabled = true;

    // Récupération des choix
    const reponses = {
        q1: form.q1.value, q2: form.q2.value, q3: form.q3.value,
        q4: form.q4.value, q5: form.q5.value, q6: form.q6.value, q7: form.q7.value
    };

    try {
        // ÉTAPE A : Le Cerveau IA rédige les 15 paragraphes
        const analyse = await genererAnalyse(reponses, texte);
        
        // ÉTAPE B : Le Facteur envoie l'email
        const succes = await envoyerAnalyseParMail(email, analyse);

        if (succes) {
            alert("Succès ! Votre analyse signature est dans votre boîte mail.");
            window.location.href = "parrainage.html";
        } else {
            throw new Error("Erreur de livraison mail");
        }
    } catch (e) {
        alert("Erreur technique. Vérifiez vos clés API sur Railway.");
        btn.disabled = false;
        btn.innerHTML = "RÉESSAYER";
    }
}
</script>
