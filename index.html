
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Derrière le Masque</title>
    <style>
        body { background-color: #2c2c2c; color: #ffffff; font-family: 'Georgia', serif; text-align: center; padding: 50px; }
        h1 { color: #d4af37; font-size: 3em; text-transform: uppercase; letter-spacing: 2px; }
        .container { background-color: #3d3d3d; padding: 30px; border-radius: 15px; border: 2px solid #d4af37; display: inline-block; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); }
        select, input { margin: 10px; padding: 10px; border-radius: 5px; border: 1px solid #d4af37; background: #2c2c2c; color: white; }
        button { background-color: #d4af37; color: #2c2c2c; border: none; padding: 15px 30px; font-size: 1.2em; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #f1c40f; transform: scale(1.05); }
        a { text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Derrière le Masque</h1>
        <p><i>L'analyse psychologique qui révèle votre véritable nature.</i></p>
        <hr style="border: 0; border-top: 1px solid #d4af37; margin: 20px 0;">
        
        <form>
            <p>Dites-nous qui vous êtes :</p>
            <input type="radio" name="genre" value="homme"> Homme
            <input type="radio" name="genre" value="femme"> Femme
            <br><br>
            <label>Votre âge :</label>
            <select name="age">
                <option>18-25 ans</option>
                <option>26-40 ans</option>
                <option>41-50 ans</option>
                <option>50+ ans</option>
            </select>
            <br>
            <a href="questions.html"><button type="button">Commencer l'analyse</button></a>
        </form>
    </div>
</body>
</html>
